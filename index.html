<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>होली की हार्दिक शुभकामनाएं</title>

<meta name="monetag" content="2ebf9dc52aa63f17020b8ff6d7063103">

<style>
body{
margin:0;
text-align:center;
font-family:Arial;
background:linear-gradient(135deg,#ff4e50,#f9d423);
color:white;
}
.container{padding:30px;}
h1{
font-size:30px;
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 25px yellow;}
}
.gif{
width:260px;
margin:20px auto;
border-radius:12px;
}
input{
padding:12px;
width:80%;
max-width:300px;
border-radius:6px;
border:none;
font-size:16px;
}
button{
margin-top:15px;
padding:12px 22px;
border:none;
border-radius:6px;
font-size:16px;
background:white;
color:#ff4e50;
cursor:pointer;
}
.footer{
margin-top:30px;
font-size:14px;
}
a{color:white;}
</style>
</head>

<body>

<div class="container">

<h1>🎨 होली की हार्दिक शुभकामनाएं 🎨</h1>

<img class="gif" src="https://media.giphy.com/media/3o6Zt6ML6BklcajjsA/giphy.gif">

<p id="liveWish">
आपकी तरफ से होली की हार्दिक शुभकामनाएं
</p>

<input type="text" id="nameInput" placeholder="अपना नाम यहाँ लिखें" oninput="updateName()"><br>

<button onclick="shareWish()">शेयर करें</button>

<div class="footer">
<a href="about.html">हमारे बारे में</a>
</div>

</div>

<script>

function updateName(){
var name=document.getElementById("nameInput").value.trim();
if(name===""){
document.getElementById("liveWish").innerText="आपकी तरफ से होली की हार्दिक शुभकामनाएं";
}else{
document.getElementById("liveWish").innerText=name+" की तरफ से होली की हार्दिक शुभकामनाएं";
}
}

function shareWish(){
var name=document.getElementById("nameInput").value.trim();
if(name===""){
alert("कृपया अपना नाम लिखें");
return;
}

/* LOAD MONETAG ONLY ON SHARE CLICK */
var s=document.createElement("script");
s.dataset.zone='10673670';
s.src='https://al5sm.com/tag.min.js';
document.body.appendChild(s);

var text=name+" की तरफ से होली की हार्दिक शुभकामनाएं 🎉\n\nदेखें यहाँ: https://v1wish.github.io/";
setTimeout(function(){
window.open("https://wa.me/?text="+encodeURIComponent(text),'_blank');
},500);

}

</script>

</body>
</html>

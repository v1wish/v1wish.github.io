<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>होली की हार्दिक शुभकामनाएं</title>

<style>
body{
margin:0;
text-align:center;
font-family:Arial;
background:linear-gradient(135deg,#ff4e50,#f9d423);
color:white;
overflow-x:hidden;
}
.container{padding:30px;}
h1{
font-size:30px;
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 25px yellow;}
}
.gif{
width:260px;
margin:20px auto;
border-radius:12px;
}
input{
padding:12px;
width:80%;
max-width:300px;
border-radius:6px;
border:none;
}
button{
margin-top:15px;
padding:12px 22px;
border:none;
border-radius:6px;
font-size:16px;
background:white;
color:#ff4e50;
cursor:pointer;
}
.music-btn{
background:#fff;
color:#000;
}
.footer{
margin-top:30px;
font-size:14px;
}
a{color:white;}
</style>
</head>

<body>

<div class="container">

<h1>🎨 होली की हार्दिक शुभकामनाएं 🎨</h1>

<img class="gif" src="https://media.giphy.com/media/3o6Zt6ML6BklcajjsA/giphy.gif">

<p>Vipul की तरफ से होली की हार्दिक शुभकामनाएं</p>

<input type="text" id="nameInput" placeholder="अपना नाम यहाँ लिखें"><br>

<button onclick="generateLink()">शेयर करें</button><br>

<button class="music-btn" onclick="playMusic()">🎵 संगीत चलाएं</button>

<div class="footer">
<a href="about.html">हमारे बारे में</a>
</div>

</div>

<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function generateLink(){
var name=document.getElementById("nameInput").value;
if(name.trim()===""){alert("कृपया अपना नाम लिखें");return;}
var text=name+" की तरफ से होली की हार्दिक शुभकामनाएं 🎉\n\nदेखें यहाँ: https://v1wish.github.io/";
window.open("https://wa.me/?text="+encodeURIComponent(text),'_blank');
}
function playMusic(){
document.getElementById("bgMusic").play();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>होली की हार्दिक शुभकामनाएं</title>

<meta name="google-adsense-account" content="ca-pub-5204243596387032">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5204243596387032"
crossorigin="anonymous"></script>

<meta property="og:title" content="होली की हार्दिक शुभकामनाएं">
<meta property="og:description" content="रंगों के इस पावन त्योहार पर आपको और आपके परिवार को हार्दिक शुभकामनाएं।">
<meta property="og:type" content="website">

<style>
body {
margin:0;
font-family:sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff0080,#ff8c00,#40e0d0);
background-size:400% 400%;
animation:bg 8s ease infinite;
color:white;
overflow:hidden;
}
@keyframes bg {
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
.container {
padding:30px;
}
h1 {
font-size:28px;
margin-top:20px;
}
.name {
font-size:24px;
font-weight:bold;
margin:15px 0;
}
input {
padding:12px;
border:none;
border-radius:8px;
width:80%;
max-width:300px;
font-size:16px;
margin-top:15px;
}
button {
padding:12px 20px;
border:none;
border-radius:8px;
margin-top:15px;
background:#fff;
color:#ff0080;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
button:hover {
opacity:0.9;
}
.music-btn {
position:fixed;
bottom:20px;
right:20px;
background:white;
color:#ff0080;
padding:10px 15px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<h1>🌸 होली की हार्दिक शुभकामनाएं 🌸</h1>
<div class="name" id="wishName"></div>

<input type="text" id="nameInput" placeholder="अपना नाम यहाँ लिखें">
<br>
<button onclick="share()">व्हाट्सएप पर शेयर करें</button>
</div>

<div class="music-btn" onclick="playMusic()">🎵 संगीत चलाएँ</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6df0f9b46f.mp3?filename=holi-party-112194.mp3" type="audio/mpeg">
</audio>

<script>
function getParam(name){
const urlParams=new URLSearchParams(window.location.search);
return urlParams.get(name);
}

const user=getParam("name");
if(user){
document.getElementById("wishName").innerText=user+" की तरफ से";
}else{
document.getElementById("wishName").innerText="विपुल की तरफ से";
}

function share(){
const name=document.getElementById("nameInput").value.trim();
if(!name){alert("कृपया अपना नाम लिखें");return;}
const link=window.location.origin+"?name="+encodeURIComponent(name);
const msg="होली की हार्दिक शुभकामनाएं 🎉\n"+link;
window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}

function playMusic(){
document.getElementById("bgMusic").play();
}
</script>

</body>
</html>

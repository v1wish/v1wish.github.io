<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>होली की हार्दिक शुभकामनाएं</title>

<meta name="monetag" content="2ebf9dc52aa63f17020b8ff6d7063103">

<script src="https://5gvci.com/act/files/tag.min.js?z=10673673" data-cfasync="false" async></script>

<style>
body {
    margin:0;
    text-align:center;
    font-family:Arial;
    background:linear-gradient(135deg,#ff4e50,#f9d423);
    color:white;
    overflow-x:hidden;
}

.container{
    padding:30px;
}

h1{
    font-size:30px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px white;}
    to{ text-shadow:0 0 20px yellow;}
}

.gif{
    width:250px;
    margin:20px auto;
}

input{
    padding:10px;
    width:80%;
    max-width:300px;
    border-radius:6px;
    border:none;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:6px;
    font-size:16px;
    background:white;
    color:#ff4e50;
    cursor:pointer;
}

.music-btn{
    margin-top:15px;
    background:#fff;
    color:#000;
}
.footer{
    margin-top:30px;
    font-size:14px;
}
a{color:white;}
</style>
</head>

<body>

<div class="container">
<h1>🎨 होली की हार्दिक शुभकामनाएं 🎨</h1>

<img class="gif" src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">

<p>Vipul की तरफ से होली की हार्दिक शुभकामनाएं</p>

<input type="text" id="nameInput" placeholder="अपना नाम यहाँ लिखें"><br>

<button onclick="generateLink()">शेयर करें</button><br>

<button class="music-btn" onclick="playMusic()">🎵 संगीत चलाएं</button>

<div class="footer">
<a href="about.html">हमारे बारे में</a>
</div>
</div>

<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function generateLink(){
var name=document.getElementById("nameInput").value;
if(name.trim()===""){alert("कृपया अपना नाम लिखें");return;}
var text=name+" की तरफ से होली की हार्दिक शुभकामनाएं 🎉\n\nदेखें यहाँ: https://v1wish.github.io/";
window.open("https://wa.me/?text="+encodeURIComponent(text),'_blank');
}

function playMusic(){
document.getElementById("bgMusic").play();
}
</script>

</body>
</html>
